name: Update leaderboard markdown

on:
  push:
    branches: [main]
    paths:
      - 'static/assets/leaderboard.csv'

jobs:
  regenerate-md:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate leaderboard_snippet.md
        run: python scripts/generate_leaderboard_md.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet static/assets/leaderboard_snippet.md || {
            git add static/assets/leaderboard_snippet.md
            git commit -m "Auto-update leaderboard_snippet.md from CSV"
            git push
          }
